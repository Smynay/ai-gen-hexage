name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: tsc -b && npx vite build --base ./ --outDir dist

      - name: Determine base path
        id: base
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "path=dev" >> $GITHUB_OUTPUT
          else
            echo "path=." >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.base.outputs.path }}
          keep_files: true
